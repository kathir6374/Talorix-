<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talorix - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(26, 26, 26, 0.95)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--white);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid var(--medium-gray);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo img {
            height: 60px;
            width: auto;
            transform: scale(2.5);
            margin-bottom: 20px;
        }

        .auth-container h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
            color: var(--white);
        }

        .auth-container form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
        }

        .auth-container input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--medium-gray);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }

        .auth-container input:focus {
            outline: none;
            border-color: var(--primary-red);
            background: rgba(0, 0, 0, 0.4);
        }

        .auth-btn {
            padding: 15px;
            background: var(--primary-red);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.3);
        }

        .auth-btn:hover {
            background: var(--light-red);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.5);
        }

        .google-btn {
            padding: 15px;
            background: white;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .google-btn:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .toggle-link:hover {
            color: var(--primary-red);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-gray);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--medium-gray);
        }

        .divider span {
            padding: 0 10px;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html">
                <img src="/brand/talorix-logo.png" alt="Talorix">
            </a>
        </div>

        <h2 id="form-title">Login to Talorix</h2>

        <form id="auth-form">
            <!-- New fields for Candidate Registration -->
            <div class="input-group" id="fullNameGroup" style="display: none;">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name">
            </div>

            <div class="input-group" id="phoneGroup" style="display: none;">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}"
                    title="10-digit phone number">
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-group" id="companyGroup" style="display: none;">
                <i class="fas fa-building"></i>
                <input type="text" id="company" placeholder="Company Name">
            </div>

            <button type="submit" id="submit-btn" class="auth-btn">Login</button>
        </form>

        <!-- Hidden OTP Section -->
        <div id="otpSection" style="display: none; text-align: center; margin-top: 20px;">
            <p style="margin-bottom: 20px; font-size: 0.95rem; color: var(--text-gray);">Enter the 6-digit OTP sent to
                your phone</p>
            <div class="input-group" style="margin-bottom: 15px;">
                <i class="fas fa-key"></i>
                <input type="text" id="otpInput" placeholder="000000" maxlength="6"
                    style="text-align: center; letter-spacing: 5px; font-size: 1.5rem; padding-left: 15px;">
            </div>
            <button id="verifyOtpBtn" class="auth-btn" style="width: 100%;">Verify & Create Account</button>
            <button id="cancelOtpBtn" class="auth-btn"
                style="width: 100%; background: transparent; border: 1px solid var(--medium-gray); margin-top: 10px;">Cancel</button>
        </div>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="google-btn" id="google-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Continue with Google
        </button>

        <div class="toggle-link" id="toggle-link">Don't have an account? Register</div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
